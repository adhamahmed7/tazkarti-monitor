name: Tazkarti Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check Tazkarti
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os, time, hashlib, base64

          BOT_TOKEN  = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID    = os.environ['TELEGRAM_CHAT_ID']
          GH_TOKEN   = os.environ['GITHUB_TOKEN']
          REPO       = os.environ['GITHUB_REPOSITORY']
          MAX_ALERTS = 3
          WINDOW     = 600

          GH_HEADERS = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }
          STATE_URL = f"https://api.github.com/repos/{REPO}/contents/state.json"

          def send_telegram(msg):
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  json={"chat_id": CHAT_ID, "text": msg, "parse_mode": "HTML"},
                  timeout=10
              )

          def load_state():
              r = requests.get(STATE_URL, headers=GH_HEADERS, timeout=10)
              if r.status_code == 200:
                  data = r.json()
                  content = json.loads(base64.b64decode(data["content"]).decode())
                  return content, data["sha"]
              return {"last_hash": "", "change_alerts": [], "zamalek_alerts": []}, None

          def save_state(state, sha):
              encoded = base64.b64encode(json.dumps(state).encode()).decode()
              payload = {"message": "update state", "content": encoded}
              if sha:
                  payload["sha"] = sha
              requests.put(STATE_URL, headers=GH_HEADERS, json=payload, timeout=10)

          def prune(state, key):
              now = time.time()
              state[key] = [t for t in state.get(key, []) if now - t < WINDOW]
              return len(state[key])

          def can_alert(state, key):
              return prune(state, key) < MAX_ALERTS

          def record(state, key):
              state.setdefault(key, []).append(time.time())

          try:
              state, sha = load_state()

              r = requests.get(
                  "https://tazkarti.com/data/matches-list-json.json",
                  headers={"User-Agent": "Mozilla/5.0", "Referer": "https://tazkarti.com/"},
                  timeout=15
              )
              raw     = r.text
              data    = r.json()
              matches = data if isinstance(data, list) else data.get("matches", data.get("data", []))

              current_hash = hashlib.md5(raw.encode()).hexdigest()
              last_hash    = state.get("last_hash", "")

              # --- ALERT 1: Any change in JSON ---
              if last_hash and current_hash != last_hash and can_alert(state, "change_alerts"):
                  n = prune(state, "change_alerts") + 1
                  send_telegram(
                      "⚡ <b>Tazkarti page changed!</b>\n\n"
                      "Something updated on the matches page.\n\n"
                      "👉 <b>Check NOW:</b> https://tazkarti.com/#/matches\n\n"
                      f"<i>(Alert {n} of {MAX_ALERTS})</i>"
                  )
                  record(state, "change_alerts")
                  print(f"CHANGE ALERT sent.")

              # --- ALERT 2: Any Zamalek match ---
              zamalek_matches = []
              for m in matches:
                  text = json.dumps(m, ensure_ascii=False).lower()
                  if "zamalek" in text or "الزمالك" in text:
                      opponent = (
                          m.get("awayTeam") or m.get("away_team") or
                          m.get("homeTeam") or m.get("home_team") or "?"
                      )
                      status = (
                          m.get("status") or m.get("ticketStatus") or
                          m.get("ticket_status") or m.get("matchStatus") or ""
                      )
                      date = m.get("date") or m.get("matchDate") or m.get("match_date") or ""
                      zamalek_matches.append({"opponent": opponent, "status": status, "date": date})

              if zamalek_matches and can_alert(state, "zamalek_alerts"):
                  n = prune(state, "zamalek_alerts") + 1
                  details = ""
                  for zm in zamalek_matches:
                      details += f"\n🏟 Zamalek vs {zm['opponent']}"
                      if zm['date']:
                          details += f"\n📅 {zm['date']}"
                      if zm['status']:
                          details += f"\n🎟 Status: {zm['status']}"
                      details += "\n"
                  send_telegram(
                      f"🚨 <b>ZAMALEK MATCH ALERT!</b> 🚨\n"
                      f"{details}\n"
                      f"👉 <b>Book NOW:</b> https://tazkarti.com/#/matches\n\n"
                      f"<i>(Alert {n} of {MAX_ALERTS})</i>"
                  )
                  record(state, "zamalek_alerts")
                  print(f"ZAMALEK ALERT sent.")

              if not last_hash:
                  print("First run — saving snapshot.")
              elif current_hash == last_hash:
                  print("No change.")

              state["last_hash"] = current_hash
              save_state(state, sha)

          except Exception as e:
              print(f"Error: {e}")
          PYEOF
