name: Tazkarti Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: alert_state.json
          key: alert-state-v2
          restore-keys: alert-state-v2

      - name: Check Tazkarti
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os, time

          BOT_TOKEN  = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID    = os.environ['TELEGRAM_CHAT_ID']
          STATE_FILE = "alert_state.json"
          MAX_ALERTS = 3
          WINDOW     = 600

          def send_telegram(msg):
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  json={"chat_id": CHAT_ID, "text": msg, "parse_mode": "HTML"},
                  timeout=10
              )

          def load_state():
              try:
                  with open(STATE_FILE) as f:
                      return json.load(f)
              except:
                  return {"last_count": 0, "change_alerts": [], "zamalek_alerts": []}

          def save_state(state):
              with open(STATE_FILE, "w") as f:
                  json.dump(state, f)

          def prune(state, key):
              now = time.time()
              state[key] = [t for t in state.get(key, []) if now - t < WINDOW]
              return len(state[key])

          def can_alert(state, key):
              return prune(state, key) < MAX_ALERTS

          def record(state, key):
              state.setdefault(key, []).append(time.time())

          try:
              state = load_state()

              r = requests.get(
                  "https://tazkarti.com/data/matches-list-json.json",
                  headers={"User-Agent": "Mozilla/5.0", "Referer": "https://tazkarti.com/"},
                  timeout=15
              )
              data    = r.json()
              matches = data if isinstance(data, list) else data.get("matches", data.get("data", []))
              count   = len(matches)
              last    = state.get("last_count", 0)

              # --- ALERT 1: Count changed (ignore first run where last=0) ---
              if last != 0 and count != last and can_alert(state, "change_alerts"):
                  n = prune(state, "change_alerts") + 1
                  send_telegram(
                      f"⚡ <b>Tazkarti Updated!</b>\n\n"
                      f"Matches: {last} → {count}\n\n"
                      f"👉 <b>Check NOW:</b> https://tazkarti.com/#/matches\n\n"
                      f"<i>(Alert {n} of {MAX_ALERTS})</i>"
                  )
                  record(state, "change_alerts")
                  print(f"CHANGE ALERT: {last} -> {count}")

              # --- ALERT 2: Any Zamalek match ---
              zamalek_matches = []
              for m in matches:
                  text = json.dumps(m, ensure_ascii=False).lower()
                  if "zamalek" in text or "الزمالك" in text:
                      opponent = (
                          m.get("awayTeam") or m.get("away_team") or
                          m.get("homeTeam") or m.get("home_team") or "?"
                      )
                      status = (
                          m.get("status") or m.get("ticketStatus") or
                          m.get("ticket_status") or m.get("matchStatus") or ""
                      )
                      date = m.get("date") or m.get("matchDate") or m.get("match_date") or ""
                      zamalek_matches.append({"opponent": opponent, "status": status, "date": date})

              if zamalek_matches and can_alert(state, "zamalek_alerts"):
                  n = prune(state, "zamalek_alerts") + 1
                  details = ""
                  for zm in zamalek_matches:
                      details += f"\n🏟 Zamalek vs {zm['opponent']}"
                      if zm['date']:
                          details += f"\n📅 {zm['date']}"
                      if zm['status']:
                          details += f"\n🎟 Status: {zm['status']}"
                      details += "\n"
                  send_telegram(
                      f"🚨 <b>ZAMALEK MATCH ALERT!</b> 🚨\n"
                      f"{details}\n"
                      f"👉 <b>Book NOW:</b> https://tazkarti.com/#/matches\n\n"
                      f"<i>(Alert {n} of {MAX_ALERTS})</i>"
                  )
                  record(state, "zamalek_alerts")
                  print(f"ZAMALEK ALERT sent.")

              if last == 0:
                  print(f"First run. Saved baseline: {count} matches.")
              elif count == last:
                  print(f"No change. Still {count} matches.")

              state["last_count"] = count
              save_state(state)

          except Exception as e:
              print(f"Error: {e}")
          PYEOF

      - name: Save alert state
        uses: actions/cache@v4
        with:
          path: alert_state.json
          key: alert-state-v2
