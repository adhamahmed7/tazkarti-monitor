name: Tazkarti Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
 
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Tazkarti
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os
 
          BOT_TOKEN = os.environ['TELEGRAM_BOT_TOKEN']
          CHAT_ID   = os.environ['TELEGRAM_CHAT_ID']
 
          def send_telegram(msg):
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  json={"chat_id": CHAT_ID, "text": msg, "parse_mode": "HTML"},
                  timeout=10
              )
 
          try:
              r = requests.get(
                  "https://tazkarti.com/data/matches-list-json.json",
                  headers={"User-Agent": "Mozilla/5.0", "Referer": "https://tazkarti.com/"},
                  timeout=15
              )
              data = r.json()
              matches = data if isinstance(data, list) else data.get("matches", data.get("data", []))
              count = len(matches)
 
              zamalek_ahly = False
              for m in matches:
                  text = json.dumps(m, ensure_ascii=False).lower()
                  if ("zamalek" in text or "الزمالك" in text) and ("ahly" in text or "الاهلي" in text or "أهلي" in text):
                      zamalek_ahly = True
                      break
 
              if zamalek_ahly:
                  send_telegram(
                      "🚨🚨 <b>ZAMALEK VS AHLY TICKETS!</b> 🚨🚨\n\n"
                      "The match is now on Tazkarti!\n\n"
                      "👉 <b>Book NOW:</b> https://tazkarti.com/#/matches"
                  )
                  print("ALERTED: Zamalek vs Ahly found!")
              elif count > 7:
                  send_telegram(
                      f"⚡ <b>Tazkarti updated!</b>\n\n"
                      f"Matches went from 7 to {count}\n\n"
                      "👉 Check now: https://tazkarti.com/#/matches"
                  )
                  print(f"ALERTED: count is now {count}")
              else:
                  print(f"No change. Still {count} matches.")
 
          except Exception as e:
              print(f"Error: {e}")
          PYEOF
 
